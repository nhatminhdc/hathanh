<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Yadea Admin</title>
  <link rel="stylesheet" href="/css/admin.min.css">
</head>
<body class="adm-body" data-admin-page="login">
  <div class="adm-login-page">
    <div class="adm-login-left">
      <h1>🛵 Yadea Hà Thành</h1>
      <p>Trang quản trị website — Quản lý sản phẩm, logo, thông tin liên hệ dễ dàng</p>
    </div>
    <div class="adm-login-right">
      <form class="adm-login-form" id="login-form">
        <h2>Đăng nhập</h2>
        <p class="subtitle">Nhập tài khoản admin để tiếp tục</p>
        <div class="adm-form-group">
          <label>Tên đăng nhập</label>
          <input class="adm-input" type="text" name="username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="adm-form-group">
          <label>Mật khẩu</label>
          <input class="adm-input" type="password" name="password" required autocomplete="current-password" placeholder="••••••">
        </div>
        <p id="login-error" class="adm-login-error hidden"></p>
        <button type="submit" class="adm-btn adm-btn-primary" style="width:100%;padding:12px;margin-top:8px">Đăng nhập</button>
      </form>
    </div>
  </div>
  <script src="/js/admin.min.js" defer></script>
</body>
</html>
